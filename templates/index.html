<!DOCTYPE html>
<html>
<head>
    <title>Music AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        /* MAIN */
        .container {
            padding: 30px;
            text-align: center;
        }

        /* FORM */
        select, button, input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #1db954;
            color: white;
            cursor: pointer;
        }

        /* SEARCH */
        #search {
            width: 300px;
        }

        /* PLAYLIST GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* CARD */
        .card {
            background: #181818;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            background: #282828;
            transform: scale(1.05);
        }

        .card a {
            color: white;
            text-decoration: none;
        }

        .title {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div>🎵 Music AI</div>
        <div>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/saved">Saved</a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="container">

        <h1>🎧 Music AI Generator</h1>

        <!-- FORM -->
        <form method="POST">
            <select name="mood">
                <option value="happy">😊 Happy</option>
                <option value="sad">😢 Sad</option>
                <option value="angry">😡 Angry</option>
            </select>

            <select name="activity">
                <option value="study">📚 Study</option>
                <option value="gym">💪 Gym</option>
                <option value="travel">✈ Travel</option>
            </select>

            <button type="submit">Generate</button>
        </form>

        <!-- SEARCH BAR -->
        <input type="text" id="search" placeholder="🔍 Search songs...">

        <!-- SAVED BUTTON -->
        <br>
        <a href="/saved">
            <button>❤️ View Saved Playlist</button>
        </a>

        <!-- PLAYLIST -->
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:20px; margin-top:30px;">

{% for song in playlist %}

    <div style="background:white; color:black; padding:15px; border-radius:10px; text-align:center;">

        <img src="{{ song.image }}" style="width:100%; border-radius:10px;">

        <h3>{{ song.name }}</h3>

        <a href="https://www.youtube.com/results?search_query={{ song.name }}" target="_blank">
            ▶ Play
        </a>

    </div>

{% endfor %}

</div>

    <!-- SEARCH SCRIPT -->
    <script>
        const search = document.getElementById("search");
        search.addEventListener("keyup", function() {
            let value = this.value.toLowerCase();
            let cards = document.querySelectorAll(".card");

            cards.forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(value) ? "block" : "none";
            });
        });
    </script>

</body>
</html>
